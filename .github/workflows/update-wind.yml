name: Update GFS Wind Data

on:
  schedule:
    - cron: '30 1,4,7,10,13,16,19,22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-wind:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libeccodes-dev

      - name: Install Python dependencies
        run: |
          pip install requests numpy cfgrib eccodes

      - name: Fetch and convert GFS wind data
        run: python fetch_gfs.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "Update GFS wind data — ${TIMESTAMP}"
            git push
          fi
